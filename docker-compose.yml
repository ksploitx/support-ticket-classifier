services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - ticketsense-net

  frontend:
    build:
      context: ./frontend
      args:
        # Browser-side URL — defaults to localhost for local demos.
        # Override for production: NEXT_PUBLIC_API_URL=https://api.example.com
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ticketsense-net

networks:
  ticketsense-net:
    driver: bridge
